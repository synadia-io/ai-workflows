# Example: thin caller workflow for a project repo
#
# Copy this file into your project's .github/workflows/ directory and customize:
#   1. Replace "your-org/ai-workflows" with your org/repo path
#   2. Set review_focus to describe your project's specific review areas
#   3. Set checkout_mode to "base" for safer fork reviews (no fork code on runner)
#   4. Add your Claude Code OAuth token as ANTHROPIC_API_KEY in the repo's secrets

name: Claude Code

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_target:
    types: [opened]

jobs:
  claude:
    uses: your-org/ai-workflows/.github/workflows/claude.yml@v1
    with:
      review_focus: |
        Additionally focus on:
        - Your project-specific review area 1
        - Your project-specific review area 2
    secrets:
      claude_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
