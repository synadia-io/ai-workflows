# Example: on-demand caller requires you to comment @claude to tirgger workflow
#
# Copy this file into your project's .github/workflows/ directory and customize:
#   1. Set with: checkout_mode=base for safer fork reviews (no fork code on runner)

name: Claude Code

# GITHUB_TOKEN is neutered — all GitHub API access uses the App token instead.
permissions: {}

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    uses: synadia-io/ai-workflows/.github/workflows/claude.yml@v2
    with:
      gh_app_id: ${{ vars.CLAUDE_GH_APP_ID }}
    secrets:
      claude_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
      gh_app_private_key: ${{ secrets.CLAUDE_GH_APP_PRIVATE_KEY }}
